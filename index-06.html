<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            background-image: url('pubg-02.png'); /* Hangi dosyadaysan o dosyanın resim adını yaz */

        }
        .container { background: rgba(0, 0, 0, 0.85); padding: 30px; border-radius: 20px; display: inline-block; width: 80%; }
        
        /* Büyüme/küçülme efekti */
        .btn-effect { 
            transition: transform 0.3s ease, background 0.3s; 
            cursor: pointer; text-decoration: none; display: block; 
            background: #222; border: 2px solid gold; padding: 15px; margin: 15px; 
            border-radius: 10px; color: white; font-weight: bold;
        }
        .btn-effect:hover { transform: scale(1.05); background: #333; }
        
        h1 { margin-bottom: 20px; }
        iframe { border: 2px solid gold; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Наруто</h1>
    <a href="001.pdf" target="_blank" class="btn-effect">откройте его как широкоэкранный</a>
    <iframe src="001.pdf" width="80%" height="600px"></iframe>
    <p>этот сценарий был отправлен в PUBG Mobile 26 мая.</p>
</div>

</body>
</html>
